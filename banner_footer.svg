<svg width="100%" viewBox="0 0 680 160" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>GitHub Profile Footer Banner - Moving Water</title>
  <desc>Animated footer banner with moving water waves and quote</desc>
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1628">
        <animate attributeName="stop-color" values="#0a1628;#0d2040;#0a1628" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0d3060">
        <animate attributeName="stop-color" values="#0d3060;#1a4a80;#0d3060" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a5f8a">
        <animate attributeName="stop-color" values="#1a5f8a;#0d4a7a;#1a6a9a;#1a5f8a" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0a2a4a">
        <animate attributeName="stop-color" values="#0a2a4a;#0d3a5a;#0a2a4a" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="deepwater" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d4a7a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#061520" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="moonGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" id="moonGlow" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#fffde0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f0d060" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="680" height="160" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="50" cy="15" r="1" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="8" r="1.5" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="0.5s"/></circle>
  <circle cx="200" cy="20" r="1" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="4s" repeatCount="indefinite" begin="1s"/></circle>
  <circle cx="310" cy="10" r="1" fill="white" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.5s" repeatCount="indefinite" begin="0.3s"/></circle>
  <circle cx="420" cy="18" r="1.5" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.8s" repeatCount="indefinite" begin="1.5s"/></circle>
  <circle cx="510" cy="6" r="1" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="4.2s" repeatCount="indefinite" begin="0.8s"/></circle>
  <circle cx="600" cy="14" r="1" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="3.1s" repeatCount="indefinite" begin="2s"/></circle>
  <circle cx="650" cy="25" r="1.5" fill="white" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.6s" repeatCount="indefinite" begin="0.4s"/></circle>
  <circle cx="80" cy="30" r="1" fill="white" opacity="0.3"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite" begin="1.2s"/></circle>
  <circle cx="370" cy="28" r="1" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.8s" repeatCount="indefinite" begin="0.7s"/></circle>

  <!-- Moon -->
  <circle cx="580" cy="30" r="16" fill="#fffde0" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.85;0.95" dur="6s" repeatCount="indefinite"/>
  </circle>
  <!-- Moon glow -->
  <circle cx="580" cy="30" r="22" fill="#fffde0" opacity="0.12">
    <animate attributeName="r" values="22;26;22" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0.06;0.12" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Moon reflection on water (shimmer) -->
  <ellipse cx="580" cy="100" rx="10" ry="30" fill="#fffde0" opacity="0.18">
    <animate attributeName="rx" values="10;4;12;6;10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.18;0.08;0.2;0.1;0.18" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="580" cy="130" rx="6" ry="12" fill="#fffde0" opacity="0.1">
    <animate attributeName="rx" values="6;2;8;3;6" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
  </ellipse>

  <!-- Water base -->
  <rect x="0" y="75" width="680" height="85" fill="url(#water)"/>

  <!-- Wave 1 - back, slow -->
  <path d="M-20,80 Q50,68 120,80 Q190,92 260,80 Q330,68 400,80 Q470,92 540,80 Q610,68 700,80 L700,160 L-20,160 Z" fill="#1e6b96" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,0;-120,0;0,0" dur="6s" repeatCount="indefinite" calcMode="linear"/>
  </path>

  <!-- Wave 2 - mid -->
  <path d="M-40,88 Q40,75 120,88 Q200,101 280,88 Q360,75 440,88 Q520,101 600,88 Q660,75 720,88 L720,160 L-40,160 Z" fill="#1a5f8a" opacity="0.75">
    <animateTransform attributeName="transform" type="translate" values="0,0;120,0;0,0" dur="4.5s" repeatCount="indefinite" calcMode="linear"/>
  </path>

  <!-- Wave 3 - front, fast -->
  <path d="M-60,96 Q30,84 120,96 Q210,108 300,96 Q390,84 480,96 Q570,108 660,96 Q700,90 740,96 L740,160 L-60,160 Z" fill="#155080" opacity="0.85">
    <animateTransform attributeName="transform" type="translate" values="0,0;-80,0;0,0" dur="3.5s" repeatCount="indefinite" calcMode="linear"/>
  </path>

  <!-- Wave 4 - foreground foam -->
  <path d="M-80,108 Q20,100 120,108 Q220,116 320,108 Q420,100 520,108 Q620,116 720,108 L720,160 L-80,160 Z" fill="#0d3a60" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0,0;60,0;0,0" dur="2.8s" repeatCount="indefinite" calcMode="linear"/>
  </path>

  <!-- Foam/white caps wave 1 -->
  <path d="M0,82 Q30,78 60,82 Q90,86 120,82 Q150,78 180,82 Q210,86 240,82 Q270,78 300,82 Q330,86 360,82 Q390,78 420,82 Q450,86 480,82 Q510,78 540,82 Q570,86 600,82 Q630,78 680,82" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5">
    <animateTransform attributeName="transform" type="translate" values="0,0;-120,0;0,0" dur="6s" repeatCount="indefinite" calcMode="linear"/>
  </path>
  <path d="M0,92 Q40,87 80,92 Q120,97 160,92 Q200,87 240,92 Q280,97 320,92 Q360,87 400,92 Q440,97 480,92 Q520,87 560,92 Q600,97 640,92 Q660,89 680,92" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0;80,0;0,0" dur="4s" repeatCount="indefinite" calcMode="linear"/>
  </path>

  <!-- Text -->
  <text x="340" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white" opacity="0.95" letter-spacing="2">
    MADE WITH ❤️ BY SAI PURNA · INDIA
  </text>
  <text x="340" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" letter-spacing="1">
    "The best time to start was yesterday. The next best time is now."
  </text>

</svg>
